<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 سوق طولقة السيارات</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
direction:rtl;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#22c55e;
position:sticky;
top:0;
}

.container{max-width:1100px;margin:auto;padding:15px;}

.box{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:20px;
}

.car{
background:#1e293b;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.car:hover{transform:scale(1.03);}

.car img{
width:100%;
height:170px;
object-fit:cover;
}

.car-body{padding:10px;}

.price{color:#22c55e;font-weight:bold;}
.small{color:#cbd5e1;font-size:13px;}
</style>
</head>

<body>

<header>🚗 سوق طولقة السيارات</header>

<div class="container">

<div class="box">
<h3>👤 الحساب</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="username" placeholder="اسمك">

<button onclick="signup()">إنشاء حساب</button>
<button onclick="login()">دخول</button>
</div>

<div class="box">
<h3>🔍 بحث</h3>
<input id="search" placeholder="ابحث..." onkeyup="render()">
<input id="min" placeholder="أقل سعر" onkeyup="render()">
<input id="max" placeholder="أعلى سعر" onkeyup="render()">
</div>

<div class="box">
<h3>🚘 إضافة سيارة</h3>
<input id="name" placeholder="اسم السيارة">
<input id="price" placeholder="السعر">
<input id="city" placeholder="المدينة">
<input type="file" id="file">

<button onclick="addCar()">نشر السيارة</button>
</div>

<div id="cars" class="grid"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyA_gDWHVyimHWnTXxwQ0IQ83PIofcxdChU",
authDomain:"cars-market-72a30.firebaseapp.com",
projectId:"cars-market-72a30",
storageBucket:"cars-market-72a30.appspot.com",
messagingSenderId:"1081449779984",
appId:"1:1081449779984:web:82ee9b6290ce10926ecb95"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser=null;
let currentUserName="";

function signup(){
auth.createUserWithEmailAndPassword(email.value,pass.value)
.then(u=>{
currentUser=u.user;
currentUserName=username.value;
alert("تم إنشاء الحساب");
});
}

function login(){
auth.signInWithEmailAndPassword(email.value,pass.value)
.then(u=>{
currentUser=u.user;
currentUserName=username.value;
alert("تم الدخول");
});
}

async function upload(file){
let ref=storage.ref("cars/"+Date.now()+file.name);
await ref.put(file);
return await ref.getDownloadURL();
}

async function addCar(){
if(!currentUser){alert("سجل دخول");return;}

let file=document.getElementById("file").files[0];
let img="";

if(file) img=await upload(file);

await db.collection("cars").add({
name:name.value,
price:Number(price.value),
city:city.value,
img:img,
time:Date.now(),
ownerName:currentUserName
});

alert("تم النشر");
}

function openCar(id){
window.location.href="car.html?id="+id;
}

let allCars=[];

db.collection("cars").orderBy("time","desc")
.onSnapshot(snap=>{
allCars=[];
snap.forEach(d=>{
allCars.push({id:d.id,...d.data()});
});
render();
});

function render(){

let min=Number(document.getElementById("min").value)||0;
let max=Number(document.getElementById("max").value)||999999999;
let search=document.getElementById("search").value.toLowerCase();

cars.innerHTML="";

allCars
.filter(c=>c.price>=min && c.price<=max && c.name.toLowerCase().includes(search))
.forEach(c=>{

cars.innerHTML+=`
<div class="car" onclick="openCar('${c.id}')">

<img src="${c.img || 'https://images.unsplash.com/photo-1503376780353-7e6692767b70'}">

<div class="car-body">
<h3>${c.name}</h3>
<div class="price">${c.price} دج</div>
<div class="small">📍 ${c.city}</div>
<div class="small">👤 ${c.ownerName || 'مستخدم'}</div>
</div>

</div>`;
});
}
</script>

</body>
</html>
