<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Market GLOBAL SaaS 🚀</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
direction:rtl;
}

/* HEADER */
header{
background:#0f172a;
padding:15px;
text-align:center;
font-size:20px;
color:#22c55e;
font-weight:bold;
}

/* LAYOUT */
.container{
max-width:1100px;
margin:auto;
padding:10px;
}

.box{
background:#111827;
padding:12px;
margin:10px 0;
border-radius:12px;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:12px;
}

/* CARD */
.card{
background:#111827;
border-radius:12px;
overflow:hidden;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
cursor:pointer;
}

.card-body{
padding:10px;
}

.price{
color:#22c55e;
font-weight:bold;
}

.small{
font-size:12px;
color:#9ca3af;
}

.delete{
background:#ef4444;
margin-top:8px;
}
</style>
</head>

<body>

<header>🚗 Car Market GLOBAL SaaS PLATFORM 🌍</header>

<div class="container">

<!-- AUTH -->
<div class="box">
<h3>👤 الحساب</h3>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">دخول</button>
<button onclick="signup()">تسجيل</button>
<button onclick="logout()">خروج</button>

<p id="status">غير مسجل</p>
</div>

<!-- ADD CAR -->
<div class="box">
<h3>➕ نشر سيارة</h3>

<input id="name" placeholder="اسم السيارة">
<input id="price" placeholder="السعر">
<input id="city" placeholder="المدينة">
<input type="file" id="file">

<button onclick="addCar()">نشر</button>
</div>

<!-- SEARCH -->
<div class="box">
<h3>🔍 بحث وفلترة</h3>

<input id="search" placeholder="بحث..." oninput="render()">
<input id="min" placeholder="أقل سعر" oninput="render()">
<input id="max" placeholder="أعلى سعر" oninput="render()">
</div>

<!-- CARS -->
<div id="cars" class="grid"></div>

</div>

<script>

// ================= FIREBASE =================
const firebaseConfig = {
apiKey:"AIzaSyA_gDWHVyimHWnTXxwQ0IQ83PIofcxdChU",
authDomain:"cars-market-72a30.firebaseapp.com",
projectId:"cars-market-72a30",
storageBucket:"cars-market-72a30.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ================= STATE =================
let user = null;
let role = "guest";
let cars = [];

const ADMIN_EMAIL = "admin@gmail.com";

// ================= AUTH =================
auth.onAuthStateChanged(u=>{
user = u;

if(!user){
role="guest";
document.getElementById("status").innerText="غير مسجل";
return;
}

document.getElementById("status").innerText="👤 "+user.email;

role = (user.email===ADMIN_EMAIL) ? "admin" : "user";
});

// ================= LOGIN =================
function login(){
auth.signInWithEmailAndPassword(email.value,pass.value)
.catch(e=>alert(e.message));
}

// ================= SIGNUP =================
function signup(){
auth.createUserWithEmailAndPassword(email.value,pass.value)
.catch(e=>alert(e.message));
}

// ================= LOGOUT =================
function logout(){
auth.signOut();
}

// ================= UPLOAD =================
async function upload(file){
let ref = storage.ref("cars/"+Date.now()+file.name);
await ref.put(file);
return await ref.getDownloadURL();
}

// ================= ADD CAR =================
async function addCar(){

if(!user){
alert("سجل دخول");
return;
}

let file = document.getElementById("file").files[0];

let img = file
? await upload(file)
: "https://images.unsplash.com/photo-1503376780353-7e6692767b70";

await db.collection("cars").add({
name:name.value,
price:Number(price.value),
city:city.value,
img,
ownerId:user.uid,
ownerEmail:user.email,
createdAt:Date.now()
});

alert("تم النشر 🚀");
}

// ================= LOAD =================
db.collection("cars")
.orderBy("createdAt","desc")
.onSnapshot(s=>{
cars=[];
s.forEach(d=>cars.push({id:d.id,...d.data()}));
render();
});

// ================= DELETE =================
async function deleteCar(id,ownerId){

if(!user){
alert("سجل دخول");
return;
}

// GLOBAL RULES
if(role==="admin" || (role==="user" && user.uid===ownerId)){
await db.collection("cars").doc(id).delete();
return;
}

alert("🚫 ليس لديك صلاحية");
}

// ================= RENDER =================
function render(){

let s=(search.value||"").toLowerCase();
let min=Number(min.value||0);
let max=Number(max.value||999999999);

cars.innerHTML="";

let filtered = cars.filter(c=>
c.price>=min &&
c.price<=max &&
(c.name||"").toLowerCase().includes(s)
);

if(filtered.length===0){
cars.innerHTML="<p>لا توجد سيارات</p>";
return;
}

filtered.forEach(c=>{
cars.innerHTML+=`
<div class="card">

<img src="${c.img}">

<div class="card-body">
<h3>${c.name}</h3>
<div class="price">${c.price} دج</div>
<div class="small">📍 ${c.city}</div>

${user && (role==="admin" || user.uid===c.ownerId)
? `<button class="delete" onclick="deleteCar('${c.id}','${c.ownerId}')">🗑 حذف</button>`
:""}

</div>
</div>
`;
});
}

</script>

</body>
</html>
