<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Market Pro - Cars</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
direction:rtl;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:20px;
color:#22c55e;
position:sticky;
top:0;
}

.container{
max-width:1000px;
margin:auto;
padding:10px;
}

.box{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#334155;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
margin-top:10px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
color:#22c55e;
font-weight:bold;
}

.small{
font-size:12px;
color:#94a3b8;
}

.btn{
padding:8px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.delete{
background:#ef4444;
color:white;
}
</style>
</head>

<body>

<header>🚗 Car Market Pro MAX - Live</header>

<div class="container">

<div class="box">
<h3>🔍 البحث المتقدم</h3>
<input id="search" placeholder="ابحث عن سيارة..." onkeyup="render()">
<input id="min" placeholder="أقل سعر" onkeyup="render()">
<input id="max" placeholder="أعلى سعر" onkeyup="render()">
</div>

<div id="cars" class="grid"></div>

</div>

<script>
// Firebase
const firebaseConfig = {
apiKey:"AIzaSyA_gDWHVyimHWnTXxwQ0IQ83PIofcxdChU",
authDomain:"cars-market-72a30.firebaseapp.com",
projectId:"cars-market-72a30",
storageBucket:"cars-market-72a30.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

let user=null;
let isAdmin=false;

const ADMIN_EMAIL="admin@gmail.com";

// auth state
auth.onAuthStateChanged(u=>{
user=u;
isAdmin = u && u.email===ADMIN_EMAIL;
});

// load cars
let allCars=[];

db.collection("cars").orderBy("createdAt","desc")
.onSnapshot(snap=>{
allCars=[];
snap.forEach(d=>{
allCars.push({id:d.id,...d.data()});
});
render();
});

// delete
async function deleteCar(id,ownerId){
if(!user) return;

if(user.uid!==ownerId && !isAdmin){
alert("غير مسموح");
return;
}

await db.collection("cars").doc(id).delete();
}

// render
function render(){

let s=(search.value||"").toLowerCase();
let min=Number(min.value)||0;
let max=Number(max.value)||999999999;

cars.innerHTML="";

allCars
.filter(c=>
c.price>=min &&
c.price<=max &&
(c.name||"").toLowerCase().includes(s)
)
.forEach(c=>{

cars.innerHTML+=`
<div class="card">
<img src="${c.img}" onclick="openCar('${c.id}')">

<div class="card-body">
<h3>${c.name}</h3>
<div class="price">${c.price} دج</div>
<div class="small">📍 ${c.city}</div>

${user && (user.uid===c.ownerId || isAdmin)
? `<button class="btn delete" onclick="deleteCar('${c.id}','${c.ownerId}')">🗑 حذف</button>`
:""}

</div>
</div>
`;
});
}

// open (future page)
function openCar(id){
window.location.href="car.html?id="+id;
}
</script>

</body>
</html>
