<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Market Pro MAX Secure</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;direction:rtl}
header{padding:15px;background:#111827;text-align:center;color:#22c55e;font-size:22px}
.container{max-width:1000px;margin:auto;padding:10px}

.box{background:#1e293b;padding:12px;margin:10px 0;border-radius:12px}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}
.card{background:#1e293b;border-radius:12px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:170px;object-fit:cover}

.small{font-size:12px;color:#94a3b8}
.price{color:#22c55e;font-weight:bold}

.admin{display:none;color:#facc15;font-weight:bold}
</style>
</head>

<body>

<header>🚗 Car Market Pro MAX 🔐</header>

<div class="container">

<div class="box">
<h3>👤 الحساب</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="signup()">تسجيل</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>
<p id="info"></p>
<p id="admin" class="admin">🛡️ Admin Mode</p>
</div>

<div class="box">
<h3>🚘 إضافة سيارة</h3>
<input id="name" placeholder="اسم السيارة">
<input id="price" placeholder="السعر">
<input id="city" placeholder="المدينة">
<input type="file" id="file">
<button onclick="addCar()">نشر السيارة</button>
</div>

<div class="box">
<input id="search" placeholder="بحث..." onkeyup="render()">
<input id="min" placeholder="أقل سعر" onkeyup="render()">
<input id="max" placeholder="أعلى سعر" onkeyup="render()">
</div>

<div class="grid" id="cars"></div>

</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyA_gDWHVyimHWnTXxwQ0IQ83PIofcxdChU",
authDomain:"cars-market-72a30.firebaseapp.com",
projectId:"cars-market-72a30",
storageBucket:"cars-market-72a30.appspot.com",
appId:"1:1081449779984:web:82ee9b6290ce10926ecb95"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let user=null;
let isAdmin=false;
let allCars=[];

// 🔐 Admin email (غيره إذا تريد)
const ADMIN_EMAIL="admin@gmail.com";

// AUTH
auth.onAuthStateChanged(u=>{
user=u;
if(user){
document.getElementById("info").innerText="👤 "+user.email;
isAdmin = user.email===ADMIN_EMAIL;
document.getElementById("admin").style.display=isAdmin?"block":"none";
}else{
document.getElementById("info").innerText="غير مسجل";
}
});

// SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value,pass.value);
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,pass.value);
}

// LOGOUT
function logout(){
auth.signOut();
}

// 🔥 Upload image
async function upload(file){
let ref=storage.ref("cars/"+Date.now()+file.name);
await ref.put(file);
return await ref.getDownloadURL();
}

// 🚗 ADD CAR (secure validation)
async function addCar(){
if(!user) return alert("سجل دخول");

if(!name.value || !price.value || !city.value)
return alert("أكمل البيانات");

if(Number(price.value)<=0)
return alert("سعر غير صالح");

let file=document.getElementById("file").files[0];

let img=file?
await upload(file):
"https://images.unsplash.com/photo-1503376780353-7e6692767b70";

await db.collection("cars").add({
name:name.value.trim(),
price:Number(price.value),
city:city.value.trim(),
img,
ownerId:user.uid,
ownerEmail:user.email,
createdAt:Date.now(),
views:0
});

alert("تم النشر");
}

// 📡 LOAD
db.collection("cars").orderBy("createdAt","desc")
.onSnapshot(s=>{
allCars=[];
s.forEach(d=>allCars.push({id:d.id,...d.data()}));
render();
});

// 🗑 DELETE (admin + owner)
async function deleteCar(id,ownerId){
if(!user) return;

if(user.uid!==ownerId && !isAdmin)
return alert("غير مسموح");

await db.collection("cars").doc(id).delete();
}

// 🎨 RENDER
function render(){

let s=(search.value||"").toLowerCase();
let min=Number(min.value)||0;
let max=Number(max.value)||999999999;

cars.innerHTML="";

allCars
.filter(c=>
c.price>=min &&
c.price<=max &&
(c.name||"").toLowerCase().includes(s)
)
.forEach(c=>{
cars.innerHTML+=`
<div class="card">
<img src="${c.img}" onclick="openCar('${c.id}')">
<div style="padding:10px">
<h3>${c.name}</h3>
<div class="price">${c.price} دج</div>
<div class="small">📍 ${c.city}</div>

${user && (user.uid===c.ownerId || isAdmin)
? `<button onclick="deleteCar('${c.id}','${c.ownerId}')">🗑 حذف</button>`
:""}
</div>
</div>`;
});
}

// 🔍 OPEN
function openCar(id){
alert("صفحة التفاصيل سيتم تطويرها في المرحلة التالية 🚀");
}
</script>

</body>
</html>
