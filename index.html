<script>
const firebaseConfig = {
apiKey:"AIzaSyA_gDWHVyimHWnTXxwQ0IQ83PIofcxdChU",
authDomain:"cars-market-72a30.firebaseapp.com",
projectId:"cars-market-72a30",
storageBucket:"cars-market-72a30.appspot.com",
messagingSenderId:"1081449779984",
appId:"1:1081449779984:web:82ee9b6290ce10926ecb95"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;
let currentUserData = null;
let allCars = [];

auth.onAuthStateChanged(async(user)=>{

if(user){

currentUser = user;

let doc = await db.collection("users").doc(user.uid).get();

if(doc.exists){
currentUserData = doc.data();
}

alert("مرحبا " + (currentUserData?.name || "مستخدم"));

}else{
currentUser = null;
currentUserData = null;
}

});

async function signup(){

if(!email.value || !pass.value || !username.value){
alert("املأ جميع الخانات");
return;
}

try{

let result = await auth.createUserWithEmailAndPassword(
email.value,
pass.value
);

await db.collection("users").doc(result.user.uid).set({
name: username.value,
email: email.value,
createdAt: Date.now(),
isAdmin:false
});

alert("تم إنشاء الحساب");

}catch(e){
alert(e.message);
}

}

async function login(){

try{

await auth.signInWithEmailAndPassword(
email.value,
pass.value
);

alert("تم تسجيل الدخول");

}catch(e){
alert(e.message);
}

}

async function upload(file){

const ref = storage.ref(
"cars/" + Date.now() + "_" + file.name
);

await ref.put(file);

return await ref.getDownloadURL();

}

async function addCar(){

if(!currentUser){
alert("سجل الدخول أولا");
return;
}

if(!name.value || !price.value || !city.value){
alert("املأ معلومات السيارة");
return;
}

let img = "";

const file = document.getElementById("file").files[0];

if(file){
img = await upload(file);
}

try{

await db.collection("cars").add({

name: name.value,
price: Number(price.value),
city: city.value,

img: img ||

"https://images.unsplash.com/photo-1503376780353-7e6692767b70",

ownerId: currentUser.uid,

ownerName: currentUserData?.name || "مستخدم",

ownerEmail: currentUser.email,

views:0,

favorites:0,

createdAt: Date.now()

});

alert("تم نشر السيارة بنجاح");

name.value="";
price.value="";
city.value="";
file.value="";

}catch(e){
alert(e.message);
}

}

function openCar(id){

db.collection("cars").doc(id).update({
views: firebase.firestore.FieldValue.increment(1)
});

window.location.href =
"car.html?id=" + id;

}

async function deleteCar(id){

if(confirm("حذف السيارة؟")){

await db.collection("cars").doc(id).delete();

}

}

db.collection("cars")
.orderBy("createdAt","desc")
.onSnapshot((snap)=>{

allCars = [];

snap.forEach((doc)=>{

allCars.push({
id:doc.id,
...doc.data()
});

});

render();

});

function render(){

const search =
document.getElementById("search")
.value
.toLowerCase();

const min =
Number(document.getElementById("min").value) || 0;

const max =
Number(document.getElementById("max").value) || 999999999;

cars.innerHTML = "";

allCars

.filter(car =>

car.price >= min &&
car.price <= max &&

car.name.toLowerCase().includes(search)

)

.forEach(car=>{

cars.innerHTML += `

<div class="car">

<img
src="${car.img}"
onclick="openCar('${car.id}')"
>

<div class="car-body">

<h3>${car.name}</h3>

<div class="price">
${car.price.toLocaleString()} دج
</div>

<div class="small">
📍 ${car.city}
</div>

<div class="small">
👤 ${car.ownerName}
</div>

<div class="small">
👁 ${car.views || 0} مشاهدة
</div>

${
currentUser &&
currentUser.uid === car.ownerId

?

`<button onclick="deleteCar('${car.id}')">
🗑 حذف
</button>`

:

""
}

</div>

</div>

`;

});

}
</script>
