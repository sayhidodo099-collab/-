<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سوق السيارات</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;text-align:center}

input,button{padding:10px;margin:5px;border:none;border-radius:8px}

.box{background:#111827;margin:10px;padding:10px;border-radius:10px}

.car{background:#1e293b;margin:10px auto;width:90%;padding:10px;border-radius:10px}

.car img{width:100%;height:200px;object-fit:cover;border-radius:10px;cursor:pointer}

.hidden{display:none}
</style>
</head>

<body>

<h1>🚗 سوق السيارات</h1>

<div class="box">
<input id="username" placeholder="اسم المستخدم">
<input id="email" placeholder="الإيميل">
<input id="pass" placeholder="كلمة السر" type="password">
<button onclick="signup()">تسجيل</button>
<button onclick="login()">دخول</button>
<button onclick="logout()">خروج</button>
<p id="userInfo"></p>
</div>

<div class="box hidden" id="addBox">
<h3>إضافة سيارة</h3>
<input id="name" placeholder="اسم السيارة">
<input id="price" placeholder="السعر">
<input id="city" placeholder="المدينة">
<input type="file" id="file">
<button onclick="addCar()">نشر</button>
</div>

<div class="box">
<input id="search" placeholder="بحث">
<input id="min" placeholder="أقل سعر">
<input id="max" placeholder="أعلى سعر">
</div>

<div id="cars">جاري التحميل...</div>

<div class="box hidden" id="details"></div>

<script>
// 🔥 Firebase
const firebaseConfig = {
apiKey:"AIzaSyA_gDWHVyimHWnTXxwQ0IQ83PIofcxdChU",
authDomain:"cars-market-72a30.firebaseapp.com",
projectId:"cars-market-72a30",
storageBucket:"cars-market-72a30.appspot.com",
messagingSenderId:"1081449779984",
appId:"1:1081449779984:web:82ee9b6290ce10926ecb95"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

const carsDiv=document.getElementById("cars");
const addBox=document.getElementById("addBox");
const details=document.getElementById("details");

let user=null;
let allCars=[];

// 👤 حالة المستخدم
auth.onAuthStateChanged(u=>{
user=u;
if(user){
document.getElementById("userInfo").innerText="👤 "+user.email;
addBox.classList.remove("hidden");
}else{
document.getElementById("userInfo").innerText="غير مسجل";
addBox.classList.add("hidden");
}
});

// 🧾 تسجيل
async function signup(){
await auth.createUserWithEmailAndPassword(email.value,pass.value);

await db.collection("users").doc(auth.currentUser.uid).set({
name:username.value,
email:email.value,
createdAt:Date.now()
});

alert("تم التسجيل");
}

// 🔑 دخول
async function login(){
await auth.signInWithEmailAndPassword(email.value,pass.value);
alert("تم الدخول");
}

// 🚪 خروج
function logout(){
auth.signOut();
}

// 📸 رفع صورة
async function upload(file){
let ref=storage.ref("cars/"+Date.now()+"_"+file.name);
await ref.put(file);
return await ref.getDownloadURL();
}

// 🚗 إضافة سيارة
async function addCar(){

if(!user) return alert("سجل الدخول");

let file=document.getElementById("file").files[0];
let img=file?await upload(file):"https://images.unsplash.com/photo-1503376780353-7e6692767b70";

await db.collection("cars").add({
name:name.value,
price:Number(price.value),
city:city.value,
img,
ownerId:user.uid,
ownerEmail:user.email,
views:0,
createdAt:Date.now()
});

alert("تم النشر");
}

// 👁 فتح تفاصيل
async function openCar(id){
let doc=await db.collection("cars").doc(id).get();
let c=doc.data();

await db.collection("cars").doc(id).update({
views:firebase.firestore.FieldValue.increment(1)
});

details.classList.remove("hidden");

details.innerHTML=`
<h2>${c.name}</h2>
<img src="${c.img}" style="width:100%">
<p>💰 ${c.price}</p>
<p>📍 ${c.city}</p>
<p>👁 ${c.views}</p>
<p>📧 ${c.ownerEmail}</p>
<button onclick="details.classList.add('hidden')">إغلاق</button>
`;
}

// 🗑 حذف
async function deleteCar(id,owner){
if(user.uid!==owner) return alert("غير مسموح");
if(confirm("حذف؟")){
await db.collection("cars").doc(id).delete();
}
}

// 📡 تحميل مباشر
db.collection("cars").onSnapshot(s=>{
allCars=[];
s.forEach(d=>allCars.push({id:d.id,...d.data()}));
render();
});

// 🎨 عرض
function render(){

let search=(document.getElementById("search").value||"").toLowerCase();
let min=Number(document.getElementById("min").value)||0;
let max=Number(document.getElementById("max").value)||999999999;

carsDiv.innerHTML="";

allCars
.filter(c=>
c.price>=min &&
c.price<=max &&
(c.name||"").toLowerCase().includes(search)
)
.forEach(c=>{

carsDiv.innerHTML+=`
<div class="car">

<img src="${c.img}" onclick="openCar('${c.id}')">

<h3>${c.name}</h3>
<p>💰 ${c.price}</p>
<p>📍 ${c.city}</p>
<p>👁 ${c.views}</p>

${
user && user.uid===c.ownerId
? `<button onclick="deleteCar('${c.id}','${c.ownerId}')">🗑 حذف</button>`
:""
}

</div>
`;
});
}
</script>

</body>
</html>
