<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Market SaaS</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0a0f1c;color:white;direction:rtl}

.nav{
display:flex;
justify-content:space-around;
background:#0f172a;
padding:10px;
position:sticky;
top:0;
}

.nav button{
background:none;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

.container{max-width:1000px;margin:auto;padding:10px}

.box{
background:#111827;
padding:12px;
border-radius:12px;
margin-top:10px;
}

input,button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
}

button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:12px;
}

.card{
background:#111827;
border-radius:12px;
overflow:hidden;
}

.card img{width:100%;height:160px;object-fit:cover}
.card-body{padding:10px}
.price{color:#22c55e;font-weight:bold}
.small{color:#9ca3af;font-size:12px}
.delete{background:#ef4444;margin-top:8px}
</style>
</head>

<body>

<div class="nav">
<button onclick="tab='home';render()">🏠</button>
<button onclick="tab='cars';render()">🚗</button>
<button onclick="tab='add';render()">➕</button>
<button onclick="tab='profile';render()">👤</button>
<button onclick="tab='login';render()">🔐</button>
</div>

<div class="container">
<div id="app"></div>
</div>

<script>

const firebaseConfig = {
apiKey:"AIzaSyA_gDWHVyimHWnTXxwQ0IQ83PIofcxdChU",
authDomain:"cars-market-72a30.firebaseapp.com",
projectId:"cars-market-72a30",
storageBucket:"cars-market-72a30.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let user=null;
let cars=[];
let tab="home";

const ADMIN="admin@gmail.com";

function safe(t){
return (t||"").toString().replace(/[<>]/g,"").trim();
}

auth.onAuthStateChanged(u=>{
user=u||null;
loadCars();
render();
});

function loadCars(){
db.collection("cars").orderBy("createdAt","desc")
.onSnapshot(s=>{
cars=[];
s.forEach(d=>cars.push({id:d.id,...d.data()}));
render();
});
}

function login(){auth.signInWithEmailAndPassword(email.value,pass.value)}
function signup(){auth.createUserWithEmailAndPassword(email.value,pass.value)}
function logout(){auth.signOut()}

async function upload(file){
if(!file) return "";
try{
let ref=storage.ref("cars/"+Date.now()+"_"+file.name);
await ref.put(file);
return await ref.getDownloadURL();
}catch(e){return ""}
}

async function addCar(){

if(!user){alert("سجل دخول");return}

let file=document.getElementById("file").files[0];
let img=await upload(file);

if(!img){
img="https://images.unsplash.com/photo-1503376780353-7e6692767b70";
}

await db.collection("cars").add({
name:safe(name.value),
price:Number(price.value||0),
city:safe(city.value),
img,
ownerId:user.uid,
ownerEmail:user.email,
createdAt:Date.now()
});

name.value="";price.value="";city.value="";
alert("تم النشر");
}

async function deleteCar(id,ownerId){
if(!user) return;
if(user.email!==ADMIN && user.uid!==ownerId) return;
await db.collection("cars").doc(id).delete();
}

function stats(){
return {
cars:cars.length,
user:user?user.email:"Guest",
role:user?(user.email===ADMIN?"Admin":"User"):"Guest"
};
}

function render(){

let s=stats();
let html="";

if(tab==="home"){
html=`
<div class="box">
<h2>Car Market SaaS</h2>
<p>Cars: ${s.cars}</p>
<p>${s.role}</p>
</div>`;
}

if(tab==="cars"){
html+=`<div class="grid">`;
cars.forEach(c=>{
html+=`
<div class="card">
<img src="${c.img}">
<div class="card-body">
<h3>${c.name}</h3>
<div class="price">${c.price} دج</div>
<div class="small">${c.city}</div>

${user && (user.uid===c.ownerId || user.email===ADMIN)
? `<button class="delete" onclick="deleteCar('${c.id}','${c.ownerId}')">حذف</button>`
:""}

</div>
</div>`;
});
html+=`</div>`;
}

if(tab==="add"){
html=`
<div class="box">
<h2>Add Car</h2>
<input id="name">
<input id="price">
<input id="city">
<input type="file" id="file">
<button onclick="addCar()">نشر</button>
</div>`;
}

if(tab==="profile"){
html=`
<div class="box">
<p>${user?user.email:"Guest"}</p>
<p>${s.role}</p>
<button onclick="logout()">Logout</button>
</div>`;
}

if(tab==="login"){
html=`
<div class="box">
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>`;
}

document.getElementById("app").innerHTML=html;
}

render();

</script>

</body>
</html>
