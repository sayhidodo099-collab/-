// إضافة سيارة
function addCar(){
  db.collection("cars").add({
    name: name.value,

  }).then(()=>{
    alert("تم نشر السيارة")
  })
}

// عرض السيارات
db.collection("cars").onSnapshot(snap=>{
  cars.innerHTML = ""

  snap.forEach(doc=>{
    let c = doc.data()

    cars.innerHTML += `
      <div class="car">
        <h3>${c.name}</h3>
