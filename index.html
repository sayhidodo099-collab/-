<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Market SaaS Pro 🚀</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
direction:rtl;
}

/* SIDEBAR */
.sidebar{
position:fixed;
right:0;
top:0;
height:100%;
width:220px;
background:#111827;
padding:15px;
}

.sidebar h2{color:#22c55e}

.sidebar button{
width:100%;
margin-top:10px;
padding:10px;
background:#1f2937;
border:none;
color:white;
cursor:pointer;
border-radius:8px;
}

.sidebar button:hover{background:#22c55e}

/* MAIN */
.main{
margin-right:240px;
padding:20px;
}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:10px;
}

.card{
background:#111827;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.box{
background:#111827;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{opacity:0.8}

.small{color:#9ca3af;font-size:12px}
.price{color:#22c55e;font-weight:bold}
</style>
</head>

<body>

<div class="sidebar">
<h2>🚗 SaaS Panel</h2>

<button onclick="tab='dashboard';renderUI()">📊 Dashboard</button>
<button onclick="tab='cars';renderUI()">🚘 Cars</button>
<button onclick="tab='add';renderUI()">➕ Add Car</button>
<button onclick="tab='login';renderUI()">🔐 Login</button>
</div>

<div class="main">

<div id="app"></div>

</div>

<script>
const firebaseConfig = {
apiKey:"AIzaSyA_gDWHVyimHWnTXxwQ0IQ83PIofcxdChU",
authDomain:"cars-market-72a30.firebaseapp.com",
projectId:"cars-market-72a30",
storageBucket:"cars-market-72a30.appspot.com",
appId:"1:1081449779984:web:82ee9b6290ce10926ecb95"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let user = null;
let cars = [];
let tab = "dashboard";

// AUTH
auth.onAuthStateChanged(u=>{
user = u;
loadCars();
renderUI();
});

// LOAD CARS
function loadCars(){
db.collection("cars").orderBy("createdAt","desc")
.onSnapshot(s=>{
cars=[];
s.forEach(d=>cars.push({id:d.id,...d.data()}));
renderUI();
});
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(email.value,pass.value);
}

// SIGNUP
function signup(){
auth.createUserWithEmailAndPassword(email.value,pass.value);
}

// LOGOUT
function logout(){
auth.signOut();
}

// ADD CAR
async function addCar(){
let file = document.getElementById("file").files[0];

let img = file
? await upload(file)
: "https://images.unsplash.com/photo-1503376780353-7e6692767b70";

await db.collection("cars").add({
name:name.value,
price:Number(price.value),
city:city.value,
img,
ownerId:user.uid,
createdAt:Date.now()
});

alert("تم");
}

// UPLOAD
async function upload(file){
let ref = storage.ref("cars/"+Date.now()+file.name);
await ref.put(file);
return await ref.getDownloadURL();
}

// UI
function renderUI(){

let html="";

// DASHBOARD
if(tab=="dashboard"){
html=`
<div class="box">
<h2>📊 Dashboard SaaS</h2>
<p>🚗 Cars: ${cars.length}</p>
<p>👤 User: ${user?user.email:"غير مسجل"}</p>
</div>`;
}

// CARS
if(tab=="cars"){
html+=`<div class="grid">`;
cars.forEach(c=>{
html+=`
<div class="card">
<img src="${c.img}">
<div style="padding:10px">
<h3>${c.name}</h3>
<div class="price">${c.price} دج</div>
<div class="small">${c.city}</div>
</div>
</div>`;
});
html+=`</div>`;
}

// ADD CAR
if(tab=="add"){
html=`
<div class="box">
<h2>➕ إضافة سيارة</h2>

<input id="name" placeholder="name">
<input id="price" placeholder="price">
<input id="city" placeholder="city">
<input type="file" id="file">

<button onclick="addCar()">نشر</button>
</div>`;
}

// LOGIN
if(tab=="login"){
html=`
<div class="box">
<h2>🔐 Login</h2>

<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">دخول</button>
<button onclick="signup()">تسجيل</button>
<button onclick="logout()">خروج</button>
</div>`;
}

document.getElementById("app").innerHTML = html;
}

renderUI();
</script>

</body>
</html>
